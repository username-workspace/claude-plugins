name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: README in sync with marketplace.json
        run: python3 scripts/readme.py --check
      - name: Vendored kernel in sync with lib/_kernel.py
        run: python3 scripts/kernel-sync.py --check
      - name: Run plugin test suites
        run: bash scripts/run-tests.sh
