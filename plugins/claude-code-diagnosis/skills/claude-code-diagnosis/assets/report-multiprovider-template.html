<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Coding Spend — All Providers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&display=swap');
:root {
  --dark: #0c0d10; --on-dark: #fafafa; --stamp: #a8231f; --blueprint: #3d5a7f;
  --ink-muted: #c9c3ba; --ink-faint: #8f8c86; --cream-muted: #b3a78f;
  --hairline: rgba(255,255,255,0.14); --hairline-faint: rgba(255,255,255,0.07);
  --surface: rgba(255,255,255,0.025);
  --font-display: 'Newsreader', Georgia, serif;
  --font-body: 'Inter', -apple-system, system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, Menlo, monospace;
  --bp-line: rgba(255,255,255,0.04); --bp-cell: 40px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
body { font-family: var(--font-body); color: var(--on-dark); padding: 48px 40px; min-height: 100vh;
  background:
    radial-gradient(900px 520px at 88% -8%, rgba(168,35,31,0.16), transparent 60%),
    radial-gradient(800px 520px at -5% 4%, rgba(61,90,127,0.18), transparent 55%),
    linear-gradient(var(--bp-line) 1px, transparent 1px) 0 0 / var(--bp-cell) var(--bp-cell),
    linear-gradient(90deg, var(--bp-line) 1px, transparent 1px) 0 0 / var(--bp-cell) var(--bp-cell),
    var(--dark); }
.wrap { max-width: 1280px; margin: 0 auto; }
.eyebrow { font-family: var(--font-mono); font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); display: inline-flex; align-items: center; gap: 10px; }
.eyebrow::before { content: ''; width: 22px; height: 2px; background: var(--stamp); display: inline-block; }
h1 { font-family: var(--font-display); font-weight: 500; font-size: 2.6rem; line-height: 1.04; letter-spacing: -0.025em; margin: 14px 0 6px; }
h1 em { font-style: italic; color: var(--stamp); }
.subtitle { font-family: var(--font-mono); color: var(--ink-faint); font-size: 0.72rem; letter-spacing: 0.04em; margin-bottom: 40px; }
.kpi-strip { display: flex; flex-wrap: wrap; gap: 0; border-top: 1px solid var(--hairline); border-bottom: 1px solid var(--hairline); padding: 24px 0; margin-bottom: 40px; }
.kpi { padding: 2px 32px; border-left: 1px solid var(--hairline-faint); flex: 1; min-width: 150px; }
.kpi:first-child { padding-left: 0; border-left: none; }
.kpi .value { font-family: var(--font-display); font-weight: 600; font-size: 2.3rem; line-height: 1; letter-spacing: -0.01em; }
.kpi.lead .value { color: var(--stamp); }
.kpi .label { font-family: var(--font-mono); font-size: 0.62rem; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-faint); margin-top: 12px; }
.kpi .sub { font-family: var(--font-mono); font-size: 0.6rem; color: var(--ink-faint); opacity: 0.8; margin-top: 5px; }
.grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; margin-bottom: 22px; }
.card { position: relative; background: var(--surface); padding: 26px; --t: 14px; --tc: var(--hairline); --tw: 1.5px;
  background-image:
    linear-gradient(var(--surface), var(--surface)),
    linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc)),
    linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc)),linear-gradient(var(--tc),var(--tc));
  background-repeat: no-repeat;
  background-size: 100% 100%, var(--t) var(--tw),var(--tw) var(--t), var(--t) var(--tw),var(--tw) var(--t), var(--t) var(--tw),var(--tw) var(--t), var(--t) var(--tw),var(--tw) var(--t);
  background-position: 0 0, top left,top left, top right,top right, bottom left,bottom left, bottom right,bottom right; }
.card.full { grid-column: 1 / -1; }
.card h2 { font-family: var(--font-mono); font-weight: 600; margin-bottom: 18px; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.12em; font-size: 0.68rem; }
.chart-container { position: relative; height: 320px; }
table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
th { text-align: left; padding: 11px 12px; border-bottom: 1px solid var(--hairline); color: var(--ink-faint); font-family: var(--font-mono); font-weight: 500; font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.1em; }
th.right, td.right { text-align: right; }
td { padding: 11px 12px; border-bottom: 1px solid var(--hairline-faint); font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
tr:last-child td { border-bottom: none; }
.name-cell { display: flex; align-items: center; gap: 10px; font-family: var(--font-body); }
.dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.bar-cell { position: relative; }
.bar-cell .fill { position: absolute; left: 0; top: 0; bottom: 0; z-index: 0; opacity: 0.22; }
.bar-cell span { position: relative; z-index: 1; }
.fineprint { font-family: var(--font-mono); font-size: 0.62rem; line-height: 1.7; color: var(--ink-faint); letter-spacing: 0.01em; margin-top: 14px; }
.fineprint code { color: var(--ink-muted); }
.share-bar { display: flex; height: 30px; border-radius: 3px; overflow: hidden; margin-bottom: 26px; }
.share-bar span { display: flex; align-items: center; justify-content: center; font-family: var(--font-mono); font-size: 0.62rem; font-weight: 600; color: #fff; }
.hero { display: grid; grid-template-columns: 280px 1fr; gap: 36px; align-items: center; padding: 34px 32px; }
.hero .pct-eyebrow { font-family: var(--font-mono); font-size: 0.74rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 4px; }
.hero .pct-num { font-family: var(--font-display); font-weight: 600; font-size: 4.7rem; line-height: 0.96; color: var(--stamp); letter-spacing: -0.03em; white-space: nowrap; }
.hero .pct-num .pct-unit { font-size: 0.42em; font-weight: 500; margin-left: 3px; color: var(--ink-muted); }
.hero .band { font-family: var(--font-mono); text-transform: uppercase; letter-spacing: 0.14em; font-size: 0.78rem; color: var(--cream-muted); margin-top: 14px; }
.hero-source { font-family: var(--font-mono); font-size: 0.62rem; line-height: 1.55; color: var(--ink-faint); margin-top: 16px; letter-spacing: 0.02em; }
.hero-source a { color: var(--cream-muted); text-decoration: none; border-bottom: 1px solid var(--hairline); }
.hero-source .src-tag { display: inline-block; margin-left: 6px; padding: 1px 6px; border: 1px solid var(--hairline-faint); border-radius: 2px; color: var(--ink-faint); font-size: 0.92em; }
.hero .lede { font-family: var(--font-display); font-size: 1.15rem; line-height: 1.5; color: var(--ink-muted); }
.hero .lede strong { color: var(--on-dark); font-weight: 600; }
.hero .lede em { color: var(--stamp); font-style: italic; }
.track-wrap { margin-top: 48px; }
.track { position: relative; height: 12px; border-radius: 6px; background: linear-gradient(90deg, #2a3340 0%, #3d5a7f 45%, #9a7b4a 72%, #a8231f 100%); }
.tick { position: absolute; top: -6px; width: 1.5px; height: 24px; background: var(--hairline); }
.tick .cap { position: absolute; top: 26px; left: 50%; transform: translateX(-50%); white-space: nowrap; font-family: var(--font-mono); font-size: 0.58rem; color: var(--ink-faint); text-transform: uppercase; letter-spacing: 0.08em; text-align: center; }
.tick .cap b { color: var(--ink-muted); display: block; font-weight: 600; font-size: 0.64rem; }
.you { position: absolute; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; }
.you .pin { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--dark); }
.you .lbl { font-family: var(--font-mono); font-size: 0.6rem; font-weight: 600; margin-top: 7px; white-space: nowrap; letter-spacing: 0.04em; }
.track-axis { display: flex; justify-content: space-between; margin-top: 58px; font-family: var(--font-mono); font-size: 0.56rem; color: var(--ink-faint); letter-spacing: 0.08em; }
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrap">

<p class="eyebrow">AI Coding · Multi-Provider</p>
<h1>AI coding spend — <em>all providers</em></h1>
<p class="subtitle" id="subtitle"></p>

<div class="kpi-strip" id="kpiStrip"></div>
<div class="share-bar" id="shareBar"></div>

<div class="grid">
  <div class="card full hero">
    <div>
      <div class="pct-eyebrow" id="pctEyebrow"></div>
      <div class="pct-num" id="pctNum"></div>
      <div class="band" id="bandLbl"></div>
    </div>
    <div>
      <div class="lede" id="heroLede"></div>
      <div class="track-wrap">
        <div class="track" id="track"></div>
        <div class="track-axis"><span id="axisLeft"></span><span>log scale · Anthropic Claude Code $/active-day</span><span id="axisRight"></span></div>
      </div>
      <div class="hero-source" id="heroSource"></div>
    </div>
  </div>

  <div class="card full"><h2>Spend by provider / month</h2><div class="chart-container"><canvas id="trendChart"></canvas></div></div>
  <div class="card"><h2>Total spend share</h2><div class="chart-container"><canvas id="provChart"></canvas></div></div>
  <div class="card">
    <h2>Providers</h2>
    <table><thead><tr><th>Provider</th><th class="right">Spend</th><th class="right">Share</th><th class="right">Tokens</th></tr></thead><tbody id="provBody"></tbody></table>
  </div>
  <div class="card full">
    <h2>Top models across providers</h2>
    <table><thead><tr><th>Model</th><th>Provider</th><th class="right">Spend</th><th class="right">Share</th></tr></thead><tbody id="modelBody"></tbody></table>
    <p class="fineprint" id="note"></p>
  </div>
</div>
</div>

<script>
const D = window.MDATA;
const usd = (n) => '$' + Math.round(n).toLocaleString('en-US');
const compact = (n) => n >= 1e9 ? (n/1e9).toFixed(1)+'B' : n >= 1e6 ? (n/1e6).toFixed(1)+'M' : n >= 1e3 ? (n/1e3).toFixed(0)+'k' : ''+n;
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const colorOf = (p) => (D.providers.find(x => x.name === p) || {}).color || '#b3a78f';

document.getElementById('subtitle').textContent =
  `${D.metadata.first_day} → ${D.metadata.last_day} · ${D.metadata.active_days} active days · source: ${D.metadata.source}`;

const oai = D.providers.find(p => p.name === 'OpenAI') || {cost:0};
const kpis = [
  [usd(D.totals.cost), 'Total AI coding spend', `${D.totals.providers} providers · ${compact(D.totals.tokens)} tokens`, true],
  [D.totals.anthropic_share_pct + '%', 'Anthropic share', 'Claude Code', false],
  [usd(oai.cost), 'OpenAI / Codex', `${oai.share_pct||0}% of spend`, false],
  [(D.by_model[0]||{}).model || '—', 'Top model', usd((D.by_model[0]||{}).cost||0), false],
];
document.getElementById('kpiStrip').innerHTML = kpis
  .map(([v,l,s,lead]) => `<div class="kpi${lead?' lead':''}"><div class="value">${v}</div><div class="label">${l}</div><div class="sub">${s||''}</div></div>`).join('');

document.getElementById('shareBar').innerHTML = D.providers
  .filter(p => p.share_pct >= 1)
  .map(p => `<span style="width:${p.share_pct}%; background:${p.color}">${p.name} ${p.share_pct}%</span>`).join('');

const P = D.percentile, BM = P.benchmark;
const fmtPct = (p) => p >= 99 ? 'Top ' + (100 - p).toFixed(1) : p.toFixed(0) + 'th';
const pinPct = (p) => p >= 99 ? '%' : ' pct';
const pT = Math.min(P.total.percentile, 99.9), pA = Math.min(P.anthropic.percentile, 99.9);
const isTopT = pT >= 99;
document.getElementById('pctEyebrow').textContent = isTopT ? 'Top' : 'Percentile';
document.getElementById('pctNum').innerHTML = isTopT
  ? (100 - pT).toFixed(1) + '<span class="pct-unit">%</span>'
  : pT.toFixed(0) + '<span class="pct-unit">th</span>';
document.getElementById('bandLbl').textContent = P.total.band + ' · all providers';
const bOrigin = BM.source_origin === 'live' ? 'live' : (BM.source_origin || '').indexOf('cache') >= 0 ? 'cached' : 'seed';
document.getElementById('heroSource').innerHTML =
  `Benchmark · <a href="${BM.source_url}" target="_blank" rel="noopener">${BM.source_label}</a> — avg $${BM.mean}/active-day, 90% &lt; $${BM.p90}/day · fetched ${BM.retrieved}<span class="src-tag">${bOrigin}</span>`;
document.getElementById('heroLede').innerHTML =
  `Across every coding agent you spend <strong>$${P.total.per_active_day.toFixed(0)}/active day</strong> of API-equivalent value — against an Anthropic-published Claude Code average of <strong>$${BM.mean}</strong> and a 90th-percentile of <strong>$${BM.p90}</strong>. ` +
  `That is <em>${P.total.x_vs_mean}×</em> the typical developer's monthly spend. You sit in the <strong>${P.total.band.toLowerCase()}</strong> tier — and your <strong>Claude Code spend alone</strong> ($${P.anthropic.per_active_day.toFixed(0)}/day) already ranks ${P.anthropic.band.toLowerCase()}. No cross-provider benchmark is published, so both read against the Claude Code population.`;
const DMIN = 2;
const maxPin = Math.max(P.total.per_active_day, P.anthropic.per_active_day);
const DMAX = Math.max(200, Math.ceil(maxPin * 1.35 / 50) * 50);
const logPos = (x) => Math.max(0.4, Math.min(99.6, Math.log(x / DMIN) / Math.log(DMAX / DMIN) * 100));
const medianV = Math.round(BM.median);
const track = document.getElementById('track');
[[medianV, 'Median'], [BM.mean, 'Average'], [BM.p90, '90th pct']].forEach(([val, cap]) => {
  const el = document.createElement('div'); el.className = 'tick'; el.style.left = logPos(val) + '%';
  el.innerHTML = `<div class="cap">${cap}<b>$${val}/d</b></div>`; track.appendChild(el);
});
function addDot(xpct, color) {
  const d = document.createElement('div');
  d.style.cssText = `position:absolute; left:${xpct}%; top:6px; width:13px; height:13px; margin:-6.5px 0 0 -6.5px; border-radius:50%; background:${color}; border:2px solid var(--dark); box-shadow:0 0 0 2px ${color}; z-index:3;`;
  track.appendChild(d);
}
function addYouLabel(xpct, color, text, place) {
  const l = document.createElement('div');
  const y = place === 'above' ? 'bottom:21px;' : 'top:21px;';
  l.style.cssText = `position:absolute; left:${xpct}%; ${y} transform:translateX(-100%); padding-right:12px; color:${color}; font-family:var(--font-mono); font-size:0.63rem; font-weight:600; white-space:nowrap; letter-spacing:0.03em;`;
  l.textContent = text;
  track.appendChild(l);
}
const cV = P.anthropic.per_active_day, tV = P.total.per_active_day;
addDot(logPos(cV), '#3d5a7f'); addYouLabel(logPos(cV), '#8fb0cf', `Claude $${cV.toFixed(0)}/d`, 'above');
addDot(logPos(tV), '#a8231f'); addYouLabel(logPos(tV), '#e0796f', `All $${tV.toFixed(0)}/d`, 'below');
document.getElementById('axisLeft').textContent = '$' + DMIN + '/d';
document.getElementById('axisRight').textContent = '$' + DMAX + '/d';

Chart.defaults.color = '#b3a78f';
Chart.defaults.font.family = "'JetBrains Mono', monospace";
Chart.defaults.font.size = 11;
const fade = (hex, a) => { const n = parseInt(hex.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; };
const monthLabels = D.monthly.months.map(m => { const [y,mo] = m.split('-'); return MONTHS[+mo-1] + " '" + y.slice(2); });

new Chart(document.getElementById('trendChart'), {
  type: 'line',
  data: { labels: monthLabels, datasets: D.providers.map(p => ({
    label: p.name, data: D.monthly.cost[p.name], borderColor: p.color, backgroundColor: fade(p.color, 0.30),
    borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true })) },
  options: { responsive: true, maintainAspectRatio: false, interaction: { mode: 'index', intersect: false },
    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, pointStyle: 'circle', boxWidth: 7, padding: 14 } },
      tooltip: { callbacks: { label: c => `${c.dataset.label}: ${usd(c.raw)}` } } },
    scales: { x: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)', drawTicks: false }, ticks: { color: '#cdc7bd', padding: 8 } },
      y: { stacked: true, grid: { color: 'rgba(255,255,255,0.05)', drawTicks: false }, ticks: { color: '#9a948b', padding: 8, callback: v => '$'+v }, beginAtZero: true } } }
});

new Chart(document.getElementById('provChart'), {
  type: 'doughnut',
  data: { labels: D.providers.map(p => p.name), datasets: [{ data: D.providers.map(p => p.cost), backgroundColor: D.providers.map(p => p.color), borderColor: '#0c0d10', borderWidth: 2 }] },
  options: { responsive: true, maintainAspectRatio: false, cutout: '58%',
    plugins: { legend: { position: 'right', labels: { usePointStyle: true, pointStyle: 'circle', boxWidth: 7, padding: 12 } },
      tooltip: { callbacks: { label: c => `${c.label}: ${usd(c.raw)} (${D.providers[c.dataIndex].share_pct}%)` } } } }
});

document.getElementById('provBody').innerHTML = D.providers.map(p => `
  <tr><td><div class="name-cell"><span class="dot" style="background:${p.color}"></span>${p.name}</div></td>
    <td class="right"><strong>${usd(p.cost)}</strong></td><td class="right">${p.share_pct}%</td><td class="right">${compact(p.tokens)}</td></tr>`).join('');

const maxC = Math.max(...D.by_model.map(m => m.cost), 1);
document.getElementById('modelBody').innerHTML = D.by_model.map(m => `
  <tr><td><div class="name-cell"><span class="dot" style="background:${m.color}"></span>${m.model}</div></td>
    <td style="color:var(--ink-faint)">${m.provider}</td>
    <td class="right bar-cell"><div class="fill" style="width:${(m.cost/maxC*100).toFixed(0)}%; background:${m.color}"></div><span>${usd(m.cost)}</span></td>
    <td class="right">${m.share_pct}%</td></tr>`).join('');

document.getElementById('note').innerHTML =
  `Source: <code>${D.metadata.source}</code> — authoritative per-token cost across every coding agent ccusage detects (Claude Code, Codex, Gemini CLI, …). Providers are attributed by model name. Figures are API-equivalent value at list prices; subscription usage is included in the plan and not billed per token. Token totals include cache reads, which dominate cached workloads.`;
</script>
</body>
</html>
